# Label 定义。后续用 gh CLI 一次性同步到仓库：
#   pnpm exec tsx scripts/sync-github-labels.ts
# 或手动 gh label create / edit。
#
# 命名约定：`<namespace>:<value>`，三类：
#   type:*     issue/PR 类型
#   priority:* 优先级
#   area:*     模块归属
#   status:*   流转状态（少用，多用 Project 看板列）

- name: "type:bug"
  color: "d73a4a"
  description: "缺陷"
- name: "type:feat"
  color: "0e8a16"
  description: "新功能 / 改进"
- name: "type:chore"
  color: "cfd3d7"
  description: "构建 / 依赖 / 工具链"
- name: "type:docs"
  color: "0075ca"
  description: "文档"
- name: "type:refactor"
  color: "fbca04"
  description: "重构（无行为变化）"
- name: "type:test"
  color: "bfd4f2"
  description: "测试相关"

- name: "priority:P0"
  color: "b60205"
  description: "阻塞主流程，必须立即修"
- name: "priority:P1"
  color: "d93f0b"
  description: "重要，本周内做"
- name: "priority:P2"
  color: "fbca04"
  description: "一般"
- name: "priority:P3"
  color: "c2e0c6"
  description: "锦上添花"

- name: "area:leads"
  color: "5319e7"
  description: "线索 / CRM"
- name: "area:landing"
  color: "5319e7"
  description: "官网 / Landing"
- name: "area:cases"
  color: "5319e7"
  description: "作品案例"
- name: "area:faqs"
  color: "5319e7"
  description: "FAQ"
- name: "area:auth"
  color: "5319e7"
  description: "登录 / 权限"
- name: "area:feishu"
  color: "5319e7"
  description: "飞书集成"
- name: "area:bitable"
  color: "5319e7"
  description: "飞书多维表格"
- name: "area:infra"
  color: "5319e7"
  description: "部署 / CI / Docker"
- name: "area:admin-ui"
  color: "5319e7"
  description: "后台 UI"

- name: "status:blocked"
  color: "000000"
  description: "被外部依赖卡住"
- name: "status:needs-design"
  color: "f9d0c4"
  description: "等设计 / 产品决策"
- name: "good first task"
  color: "7057ff"
  description: "适合新人入手"
