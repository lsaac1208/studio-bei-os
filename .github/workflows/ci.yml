name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 同一 ref 上有新 push 时取消正在跑的旧 run，节省 Actions 额度
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PNPM_VERSION: 10
  NODE_VERSION: 22

jobs:
  # ─────────────────────────────────────────────────────────────
  # 1) Lint + Typecheck（最快反馈，~1-2 min）
  # ─────────────────────────────────────────────────────────────
  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Biome CI
        run: pnpm run ci

      - name: TypeScript typecheck
        run: pnpm typecheck

  # ─────────────────────────────────────────────────────────────
  # 2) Build（next build 验证，~3-5 min）
  # ─────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-typecheck
    env:
      NEXT_TELEMETRY_DISABLED: 1
      DATABASE_URL: "postgres://dummy:dummy@localhost:5432/dummy"
      BETTER_AUTH_SECRET: "ci-dummy-secret-32-chars-min-needed-here"
      BETTER_AUTH_URL: "http://localhost:3000"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Next build
        run: pnpm build

  # ─────────────────────────────────────────────────────────────
  # 3) E2E Playwright + Postgres（~8-12 min）
  # ─────────────────────────────────────────────────────────────
  e2e:
    name: E2E (Playwright + Postgres)
    runs-on: ubuntu-latest
    needs: lint-typecheck
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: studio_bei
          POSTGRES_USER: studio_bei
          POSTGRES_PASSWORD: ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U studio_bei -d studio_bei"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NEXT_TELEMETRY_DISABLED: 1
      DATABASE_URL: "postgres://studio_bei:ci_password@localhost:5432/studio_bei"
      BETTER_AUTH_SECRET: "ci-dummy-secret-32-chars-min-needed-here"
      BETTER_AUTH_URL: "http://localhost:3000"
      NEXT_PUBLIC_SITE_URL: "http://localhost:3000"
      ADMIN_EMAIL: "ci@example.com"
      ADMIN_INITIAL_PASSWORD: "ci-only-password"
      E2E_BASE_URL: "http://localhost:3000"
      E2E_ALLOW_WRITE: "1"
      CRON_SECRET: "ci-cron-secret"

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: DB push schema
        run: pnpm exec drizzle-kit push --force

      - name: DB seed
        run: pnpm exec tsx db/seed.ts && pnpm exec tsx db/seed-cases.ts && pnpm exec tsx db/seed-landing.ts

      - name: Next build
        run: pnpm build

      - name: Start server (background)
        run: |
          pnpm start &
          echo "SERVER_PID=$!" >> $GITHUB_ENV
          # 等 server 起来
          npx -y wait-on http://localhost:3000 --timeout 60000

      - name: Run Playwright tests
        run: pnpm test:e2e

      - name: Stop server
        if: always()
        run: kill $SERVER_PID || true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
