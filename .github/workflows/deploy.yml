name: Deploy

# ─────────────────────────────────────────────────────────────
# Studio Bei OS · 生产部署
#
# 路线：rsync from GitHub Actions runner to ECS
# 原因：ECS 在阿里云上海，到 github.com 的 HTTPS 被 GFW 拦截，
#       所以由 runner（海外）做中转：checkout → rsync → SSH 触发 deploy.sh
#
# 触发：
#   1) CI 在 main 上成功 → workflow_run 自动接力
#   2) 手动 workflow_dispatch
#
# Secrets 需要：
#   SSH_HOST = 106.14.160.150
#   SSH_USER = root
#   SSH_KEY  = fwq.pem 完整内容（含 BEGIN/END 行）
# ─────────────────────────────────────────────────────────────

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

# 独立并发组，确保部署不会被新 push 中途打断
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    # 只在以下两种情况跑：
    #   - workflow_run：必须是 push 事件触发的 CI 且 CI 全绿
    #   - workflow_dispatch：手动触发时直接跑
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push')

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          # workflow_run 触发时取被测试的那个 SHA（确保部署的是 CI 验证过的版本）
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup SSH key
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -p 22 -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          echo "ssh key ready"

      - name: Rsync source to ECS
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        # 注意 rsync filter 顺序：先匹配先生效
        #   .env          → 精确匹配，排除（保留服务器上的生产配置）
        #   .env.example  → 显式 include（虽然名字匹配下一行的 .env.*，但 include 优先）
        #   .env.*        → 排除 .env.local / .env.production 等
        run: |
          rsync -az --delete --stats \
            --no-owner --no-group \
            --exclude='.git/' \
            --exclude='node_modules/' \
            --exclude='.next/' \
            --exclude='.env' \
            --include='.env.example' \
            --exclude='.env.*' \
            --exclude='*.tsbuildinfo' \
            --exclude='next-env.d.ts' \
            --exclude='playwright-report/' \
            --exclude='test-results/' \
            --exclude='*.tar.gz' \
            --exclude='*.pem' \
            -e "ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=no" \
            ./ "$SSH_USER@$SSH_HOST:/opt/studio-bei-os/"

      - name: Trigger deploy.sh on ECS
        uses: appleboy/ssh-action@v1
        env:
          # 短 SHA 作为镜像 tag；deploy.sh 会读取此变量给镜像打 tag 方便回滚
          DEPLOY_SHA_FULL: ${{ github.event.workflow_run.head_sha || github.sha }}
          # Sentry source map 上传（构建期）；未配置 secret 时为空字符串，build 仍成功
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          # 透传到远端 shell（deploy.sh 会再 export 给 docker compose）
          envs: DEPLOY_SHA_FULL,SENTRY_AUTH_TOKEN
          # 1.7GB ECS 构建 Next + Docker 比较慢，给足超时
          command_timeout: 30m
          script: |
            set -euo pipefail

            export DEPLOY_SHA="${DEPLOY_SHA_FULL:0:7}"
            export SENTRY_AUTH_TOKEN

            cd /opt/studio-bei-os
            echo "==> 部署版本 (commit SHA): ${DEPLOY_SHA_FULL} (短: ${DEPLOY_SHA})"

            echo "==> 执行 deploy.sh"
            bash scripts/deploy.sh

            echo "==> 部署完成，容器状态："
            docker compose ps
            echo ""
            echo "==> 已 tag 镜像（最近 10 个，可回滚）："
            docker images studio-bei-os --format 'table {{.Tag}}\t{{.CreatedAt}}\t{{.Size}}' | head -12
