name: Deploy

# ─────────────────────────────────────────────────────────────
# Studio Bei OS · 生产部署
#
# 路线：rsync from GitHub Actions runner to ECS
# 原因：ECS 在阿里云上海，到 github.com 的 HTTPS 被 GFW 拦截，
#       所以由 runner（海外）做中转：checkout → rsync → SSH 触发 deploy.sh
#
# 触发：
#   1) CI 在 main 上成功 → workflow_run 自动接力
#   2) 手动 workflow_dispatch
#
# Secrets 需要：
#   SSH_HOST = 106.14.160.150
#   SSH_USER = root
#   SSH_KEY  = fwq.pem 完整内容（含 BEGIN/END 行）
# ─────────────────────────────────────────────────────────────

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

# 独立并发组，确保部署不会被新 push 中途打断
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    # 只在以下两种情况跑：
    #   - workflow_run：必须是 push 事件触发的 CI 且 CI 全绿
    #   - workflow_dispatch：手动触发时直接跑
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push')

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          # workflow_run 触发时取被测试的那个 SHA（确保部署的是 CI 验证过的版本）
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup SSH key
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -p 22 -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          echo "ssh key ready"

      - name: Rsync source to ECS
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        # 注意 rsync filter 顺序：先匹配先生效
        #   .env          → 精确匹配，排除（保留服务器上的生产配置）
        #   .env.example  → 显式 include（虽然名字匹配下一行的 .env.*，但 include 优先）
        #   .env.*        → 排除 .env.local / .env.production 等
        run: |
          rsync -az --delete --stats \
            --no-owner --no-group \
            --exclude='.git/' \
            --exclude='node_modules/' \
            --exclude='.next/' \
            --exclude='.env' \
            --include='.env.example' \
            --exclude='.env.*' \
            --exclude='*.tsbuildinfo' \
            --exclude='next-env.d.ts' \
            --exclude='playwright-report/' \
            --exclude='test-results/' \
            --exclude='*.tar.gz' \
            --exclude='*.pem' \
            -e "ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=no" \
            ./ "$SSH_USER@$SSH_HOST:/opt/studio-bei-os/"

      # ────────────────────────────────────────
      # 为什么拆成「启动 + 轮询」两步？
      # 阿里云 ECS 到 GitHub Actions runner 的 SSH 长连接在 ~20-30 min 会被
      # 中间 NAT/网关切断（观察：Deploy #9 跑 26 min 后 SSH 被中断、但 ECS 上
      # deploy.sh 还在跑）。拆分后：
      #   1) Start step：~5s 短 SSH，nohup+setsid 后台拉起 deploy.sh 立即返回
      #   2) Poll step：每 30s 起一条全新的短 SSH，读 /tmp/sb-deploy.done 状态文件
      # 即使某次 poll SSH 被切也不会弄死本机的 deploy.sh，下一轮重试即可。
      - name: Start deploy.sh on ECS (detached)
        uses: appleboy/ssh-action@v1
        env:
          # 短 SHA 作为镜像 tag；deploy.sh 会读取此变量给镜像打 tag 方便回滚
          DEPLOY_SHA_FULL: ${{ github.event.workflow_run.head_sha || github.sha }}
          # Sentry source map 上传（构建期）；未配置 secret 时为空字符串，build 仍成功
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          envs: DEPLOY_SHA_FULL,SENTRY_AUTH_TOKEN
          # 只是启动后台作业，顺势拉起 ~5s 就返回
          command_timeout: 2m
          script: |
            set -euo pipefail

            export DEPLOY_SHA="${DEPLOY_SHA_FULL:0:7}"
            export SENTRY_AUTH_TOKEN

            cd /opt/studio-bei-os
            echo "==> 部署版本 (commit SHA): ${DEPLOY_SHA_FULL} (短: ${DEPLOY_SHA})"

            # 清理上轮状态
            rm -f /tmp/sb-deploy.done /tmp/sb-deploy.pid /tmp/sb-deploy.sha
            : > /tmp/sb-deploy.log
            echo "${DEPLOY_SHA_FULL}" > /tmp/sb-deploy.sha

            # 写独立 runner 脚本，使其容易 setsid detach；末尾写 exit code 到 done 文件
            cat > /tmp/sb-deploy-runner.sh <<RUN
            #!/usr/bin/env bash
            cd /opt/studio-bei-os
            export DEPLOY_SHA='${DEPLOY_SHA}'
            export DEPLOY_SHA_FULL='${DEPLOY_SHA_FULL}'
            export SENTRY_AUTH_TOKEN='${SENTRY_AUTH_TOKEN}'
            export APP_VERSION='${DEPLOY_SHA}'
            bash scripts/deploy.sh
            RC=\$?
            echo \$RC > /tmp/sb-deploy.done
            RUN
            chmod +x /tmp/sb-deploy-runner.sh

            # setsid + nohup 双保险让 deploy.sh 脱离 SSH session
            # </dev/null 防止子进程继承 SSH 的 stdin 句柄
            setsid nohup /tmp/sb-deploy-runner.sh > /tmp/sb-deploy.log 2>&1 < /dev/null &
            DEPLOY_PID=$!
            disown "$DEPLOY_PID" 2>/dev/null || true
            echo "$DEPLOY_PID" > /tmp/sb-deploy.pid

            echo "==> deploy.sh 已 detach，PID=$DEPLOY_PID"
            sleep 2
            echo "--- 早期输出 ---"
            head -20 /tmp/sb-deploy.log 2>&1 || true

      - name: Poll deploy.sh status
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        # 独立走 bash + ssh CLI，避免 appleboy/ssh-action 的长连接
        # 最多轮询 40 min，每 30s 一次，每次 SSH 短连接 ~3s。
        run: |
          set -uo pipefail
          SSH_OPTS="-i ~/.ssh/id_deploy -o StrictHostKeyChecking=no -o ConnectTimeout=15 -o ServerAliveInterval=20 -o ServerAliveCountMax=3"
          REMOTE="${SSH_USER}@${SSH_HOST}"

          poll_remote() {
            ssh $SSH_OPTS "$REMOTE" 'bash -s' <<"REMOTE_EOF"
            if [ -f /tmp/sb-deploy.done ]; then
              echo "STATUS=DONE"
              echo "EXIT=$(cat /tmp/sb-deploy.done)"
            elif [ -f /tmp/sb-deploy.pid ] && kill -0 $(cat /tmp/sb-deploy.pid) 2>/dev/null; then
              echo "STATUS=RUNNING"
              echo "PID=$(cat /tmp/sb-deploy.pid)"
              echo "LOG_LINES=$(wc -l < /tmp/sb-deploy.log 2>/dev/null || echo 0)"
              echo "--- tail -15 ---"
              tail -15 /tmp/sb-deploy.log 2>/dev/null || true
            else
              echo "STATUS=ORPHAN"
              echo "--- tail -30 ---"
              tail -30 /tmp/sb-deploy.log 2>/dev/null || true
            fi
          REMOTE_EOF
          }

          MAX_TRIES=80   # 80 * 30s = 40 min
          for i in $(seq 1 $MAX_TRIES); do
            ELAPSED=$((i * 30))
            echo ""
            echo "========== Poll #$i (${ELAPSED}s elapsed) =========="
            OUT=$(poll_remote 2>&1) || { echo "SSH 失败，30s 后重试"; echo "$OUT" | head -5; sleep 30; continue; }
            echo "$OUT"

            STATUS=$(echo "$OUT" | grep '^STATUS=' | head -1 | cut -d= -f2 || true)
            case "$STATUS" in
              DONE)
                EXIT_CODE=$(echo "$OUT" | grep '^EXIT=' | head -1 | cut -d= -f2 || echo "?")
                echo ""
                echo "========== deploy.sh 完成 exit=$EXIT_CODE =========="
                ssh $SSH_OPTS "$REMOTE" 'echo "--- deploy.sh 完整尾日志 (后 80 行) ---"; tail -80 /tmp/sb-deploy.log; echo ""; echo "--- docker compose ps ---"; cd /opt/studio-bei-os && docker compose ps; echo ""; echo "--- 本地 /api/health ---"; curl -sS --max-time 5 http://localhost:13001/api/health || echo "app 未存活"' || true
                if [ "$EXIT_CODE" = "0" ]; then
                  echo "✅ 部署成功"
                  exit 0
                else
                  echo "❌ deploy.sh 退出码 $EXIT_CODE"
                  exit 1
                fi
                ;;
              RUNNING)
                # 还在跑，继续等
                sleep 30
                ;;
              ORPHAN)
                echo "⚠️  deploy.sh 进程丢失且 done 文件未生成（可能被 OOM kill / 被人手动杀）"
                exit 1
                ;;
              *)
                echo "⚠️  未知状态，30s 后重试"
                sleep 30
                ;;
            esac
          done

          echo "❌ 40 分钟轮询超时，deploy.sh 仍未完成"
          ssh $SSH_OPTS "$REMOTE" 'tail -100 /tmp/sb-deploy.log' || true
          exit 1
