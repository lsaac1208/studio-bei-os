# ─────────────────────────────────────────────────────────────
# Studio Bei OS · Nginx vhost
# 部署位置：/etc/nginx/sites-available/100yse.com
# 软链：    ln -s /etc/nginx/sites-available/100yse.com /etc/nginx/sites-enabled/
# 测试：    nginx -t
# 启用 HTTPS（首次）：certbot --nginx -d 100yse.com -d www.100yse.com
# 自动续签：certbot 已在 systemd timer 里
# ─────────────────────────────────────────────────────────────

server {
    listen 80;
    listen [::]:80;
    server_name 100yse.com www.100yse.com;

    # certbot 会把这部分改成 301 → https，初次部署先放着用 80 跑通
    # 后续 HTTPS 块由 certbot 自动追加

    client_max_body_size 16M;
    server_tokens off;

    # 安全响应头（独立文件，方便在 certbot 生成的 HTTPS 块里同样 include 一次）
    include /opt/studio-bei-os/deploy/nginx/security-headers.conf;

    # ── Next.js 静态资源（_next/static、image 等）：长缓存 ──
    location /_next/static/ {
        proxy_pass http://127.0.0.1:13001;
        proxy_set_header Host $host;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── public/ 静态资源：中等缓存 ──
    location ~* \.(ico|png|jpg|jpeg|svg|webp|woff2?)$ {
        proxy_pass http://127.0.0.1:13001;
        proxy_set_header Host $host;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # ── 主反代（含 API、SSR、Server Actions） ──
    location / {
        proxy_pass http://127.0.0.1:13001;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Server Actions / WebSocket / Streaming 需要保留长连接
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_request_buffering off;

        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
    }

    # 隐藏 Nginx 默认错误页 footer
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /var/www/html;
        internal;
    }
}
