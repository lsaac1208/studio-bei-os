# Studio Bei OS · 共享安全响应头
# 被 100yse.com.conf 用 `include` 引入；也建议在 certbot 生成的 HTTPS 块里 include 一次。
#
# 所有头都用 `always`，错误页（4xx/5xx）也会带上。
#
# 说明：
# - Strict-Transport-Security   HSTS 2 年 + 子域 + preload（只在 HTTPS 下生效）
# - X-Frame-Options DENY         防点击劫持（互联网上不许被 iframe 嵌）
# - X-Content-Type-Options nosniff  禁 MIME 嗅探
# - Referrer-Policy              发起跨源时只泄露 origin，不泄露路径/参数
# - Permissions-Policy           禁用未用到的浏览器权限 + 退出 FLoC
# - Content-Security-Policy-Report-Only   先观测，不强制（避免一上来打坏页面）；
#                               确认没有违规后再切到正式 CSP

add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=(), browsing-topics=()" always;
add_header X-XSS-Protection "0" always;

# CSP 报告模式（不阻断）。观察 Sentry / 浏览器 console 无违规后，改为 Content-Security-Policy 硬执行。
# - unsafe-inline / unsafe-eval：Next.js 内联 script + runtime 所需（未来接 nonce 可去掉）
# - img https: + blob: + data:：允许 Vercel Blob 图片 + 内联图
# - connect https://*.ingest.sentry.io：Sentry 直传（如果只用 /sentry-tunnel 可收紧）
add_header Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https://*.ingest.sentry.io; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
